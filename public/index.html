<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Free mobile AI-powered email assistant – compose, summarize, and reply to emails smarter." />
  <meta name="theme-color" content="#4f46e5" />
  <title>Email AI Assistant</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span class="logo-text">Email AI</span>
      </div>
      <div class="header-actions">
        <select id="language-select" class="language-select" aria-label="Language">
          <option value="English">EN</option>
          <option value="Traditional Chinese">繁中</option>
          <option value="Simplified Chinese">简中</option>
          <option value="Japanese">日本語</option>
          <option value="Spanish">ES</option>
          <option value="French">FR</option>
        </select>
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav" role="tablist" aria-label="Features">
    <button class="tab-btn active" role="tab" aria-selected="true" data-tab="compose" aria-controls="tab-compose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span>Compose</span>
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="summarize" aria-controls="tab-summarize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Summarize</span>
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="reply" aria-controls="tab-reply">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
      </svg>
      <span>Reply</span>
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="improve" aria-controls="tab-improve">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>Improve</span>
    </button>
  </nav>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Compose Tab -->
    <section id="tab-compose" class="tab-panel active" role="tabpanel">
      <div class="card">
        <h2 class="section-title">✍️ Compose Email</h2>
        <p class="section-desc">Let AI write a professional email for you</p>
        <div class="form-group">
          <label for="compose-subject" class="label">Subject *</label>
          <input id="compose-subject" type="text" class="input" placeholder="e.g. Meeting request for next week" maxlength="200" />
        </div>
        <div class="form-group">
          <label for="compose-context" class="label">Additional context</label>
          <textarea id="compose-context" class="textarea" placeholder="Any details you want to include..." rows="3" maxlength="1000"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group flex-1">
            <label for="compose-tone" class="label">Tone</label>
            <select id="compose-tone" class="select">
              <option value="professional">Professional</option>
              <option value="friendly">Friendly</option>
              <option value="formal">Formal</option>
              <option value="casual">Casual</option>
              <option value="persuasive">Persuasive</option>
              <option value="apologetic">Apologetic</option>
            </select>
          </div>
        </div>
        <button id="compose-btn" class="btn btn-primary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          Generate Email
        </button>
      </div>
      <div id="compose-result" class="result-card hidden"></div>
    </section>

    <!-- Summarize Tab -->
    <section id="tab-summarize" class="tab-panel hidden" role="tabpanel">
      <div class="card">
        <h2 class="section-title">📋 Summarize Email</h2>
        <p class="section-desc">Get a quick summary of any email</p>
        <div class="form-group">
          <label for="summarize-email" class="label">Email content *</label>
          <textarea id="summarize-email" class="textarea" placeholder="Paste the email you want to summarize..." rows="8" maxlength="5000"></textarea>
          <span class="char-count" id="summarize-count">0 / 5000</span>
        </div>
        <button id="summarize-btn" class="btn btn-primary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          Summarize
        </button>
      </div>
      <div id="summarize-result" class="result-card hidden"></div>
    </section>

    <!-- Reply Tab -->
    <section id="tab-reply" class="tab-panel hidden" role="tabpanel">
      <div class="card">
        <h2 class="section-title">↩️ Smart Reply</h2>
        <p class="section-desc">Generate a reply to any email</p>
        <div class="form-group">
          <label for="reply-email" class="label">Original email *</label>
          <textarea id="reply-email" class="textarea" placeholder="Paste the email you want to reply to..." rows="6" maxlength="5000"></textarea>
          <span class="char-count" id="reply-count">0 / 5000</span>
        </div>
        <div class="form-group">
          <label for="reply-intent" class="label">Reply intent</label>
          <input id="reply-intent" type="text" class="input" placeholder="e.g. Accept the meeting, ask for more details" maxlength="300" />
        </div>
        <div class="form-group">
          <label for="reply-tone" class="label">Tone</label>
          <select id="reply-tone" class="select">
            <option value="professional">Professional</option>
            <option value="friendly">Friendly</option>
            <option value="formal">Formal</option>
            <option value="casual">Casual</option>
            <option value="apologetic">Apologetic</option>
          </select>
        </div>
        <button id="reply-btn" class="btn btn-primary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          Generate Reply
        </button>
      </div>
      <div id="reply-result" class="result-card hidden"></div>
    </section>

    <!-- Improve Tab -->
    <section id="tab-improve" class="tab-panel hidden" role="tabpanel">
      <div class="card">
        <h2 class="section-title">⭐ Improve Draft</h2>
        <p class="section-desc">Polish your email draft with AI</p>
        <div class="form-group">
          <label for="improve-email" class="label">Your draft *</label>
          <textarea id="improve-email" class="textarea" placeholder="Paste your email draft here..." rows="8" maxlength="5000"></textarea>
          <span class="char-count" id="improve-count">0 / 5000</span>
        </div>
        <button id="improve-btn" class="btn btn-primary">
          <svg class="btn-icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          Improve Email
        </button>
      </div>
      <div id="improve-result" class="result-card hidden"></div>
    </section>

  </main>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
