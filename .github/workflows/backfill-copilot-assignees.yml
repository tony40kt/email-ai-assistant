name: Backfill Copilot Assignees

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to all open auto:implement issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "auto:implement";

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100
            });

            core.info(`Found ${issues.length} open issue(s) with label "${label}".`);

            let assigned = 0;
            let skipped = 0;

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const alreadyAssigned = (issue.assignees || []).some(
                (a) => a.login === "Copilot"
              );

              if (alreadyAssigned) {
                core.info(`#${issue.number} — Copilot already assigned. Skipping.`);
                skipped += 1;
                continue;
              }

              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issue.number,
                assignees: ["Copilot"]
              });

              core.info(`#${issue.number} — Assigned Copilot.`);
              assigned += 1;
            }

            core.info(`Done. Assigned: ${assigned}, Already assigned (skipped): ${skipped}.`);
