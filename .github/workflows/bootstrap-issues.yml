name: Bootstrap Planned Issues

on:
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Create labels and planned issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labelDefinitions = [
              { name: "type:epic", color: "5319e7" },
              { name: "type:feature", color: "1d76db" },
              { name: "type:task", color: "0e8a16" },
              { name: "type:bug", color: "d73a4a" },
              { name: "priority:P0", color: "b60205" },
              { name: "priority:P1", color: "d93f0b" },
              { name: "priority:P2", color: "fbca04" },
              { name: "priority:P3", color: "c2e0c6" },
              { name: "area:project", color: "ededed" },
              { name: "area:ios", color: "ededed" },
              { name: "area:backend", color: "ededed" },
              { name: "area:oauth", color: "ededed" },
              { name: "area:mail-sync", color: "ededed" },
              { name: "area:classification", color: "ededed" },
              { name: "area:label", color: "ededed" },
              { name: "area:search", color: "ededed" },
              { name: "area:notification", color: "ededed" },
              { name: "area:scheduler", color: "ededed" },
              { name: "area:translation", color: "ededed" },
              { name: "area:ui", color: "ededed" },
              { name: "area:i18n", color: "ededed" },
              { name: "area:security", color: "ededed" },
              { name: "area:qa", color: "ededed" },
              { name: "area:workflow", color: "ededed" },
              { name: "area:docs", color: "ededed" },
              { name: "auto:implement", color: "0052cc" }
            ];

            for (const label of labelDefinitions) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label.name,
                color: label.color,
                description: `Auto-managed label: ${label.name}`
              }).catch(() => {});
            }

            const issues = [
              {
                title: "[EPIC] 專案初始化與技術基線建立",
                labels: ["type:epic", "priority:P0", "area:project"],
                purpose: "建立可持續開發的專案骨架與流程。",
                workitems: [
                  "決定前端與後端技術棧（以免費資源為優先）",
                  "建立環境變數與 Secrets 清單",
                  "建立基本分支策略與命名規範",
                  "定義 Issue/PR 流程"
                ],
                dod: [
                  "文件可讓新成員 30 分鐘內理解流程",
                  "關鍵設定有範例與說明"
                ],
                notes: "由於是個人團隊，流程必須簡單可維護。"
              },
              {
                title: "[FEATURE] iOS 登入流程與 OAuth 連線（Gmail / Outlook）",
                labels: ["type:feature", "priority:P0", "area:oauth", "area:ios"],
                purpose: "讓使用者安全授權郵件帳號。",
                workitems: [
                  "設計 OAuth 登入畫面（繁中）",
                  "實作 Gmail OAuth",
                  "預留 Outlook OAuth 擴充點",
                  "Token 儲存安全策略"
                ],
                dod: [
                  "可成功登入並取得郵件讀取權限",
                  "Token 不出現在前端日誌"
                ],
                notes: "免費方案先以 Gmail 優先，Outlook 可次階段。"
              },
              {
                title: "[FEATURE] 郵件同步與基本資料模型建立",
                labels: ["type:feature", "priority:P0", "area:mail-sync", "area:backend"],
                purpose: "建立郵件讀取與本地/雲端資料模型。",
                workitems: [
                  "設計郵件欄位模型（寄件人、收件人、主旨、已讀）",
                  "建立同步機制（分頁/增量）",
                  "建立錯誤重試流程"
                ],
                dod: [
                  "可穩定載入郵件列表",
                  "同步失敗可提示使用者並可重試"
                ],
                notes: "避免一次載入過多郵件造成卡頓。"
              },
              {
                title: "[FEATURE] 分類規則管理（寄件人/關鍵字/收件人 + 優先順序）",
                labels: ["type:feature", "priority:P0", "area:classification", "area:ui"],
                purpose: "使用者可建立、排序、啟用/停用分類規則。",
                workitems: [
                  "規則 CRUD（新增/編輯/刪除）",
                  "優先順序排序 UI",
                  "規則驗證（避免空條件）"
                ],
                dod: [
                  "規則可成功儲存並排序",
                  "非法輸入有明確提示"
                ],
                notes: "排序邏輯要穩定（同優先時按建立時間）。"
              },
              {
                title: "[FEATURE] 郵件分類引擎與標籤套用",
                labels: ["type:feature", "priority:P0", "area:classification", "area:label"],
                purpose: "依規則自動分類並加上標籤。",
                workitems: [
                  "規則比對引擎（多條件）",
                  "優先順序衝突解決",
                  "標籤套用與更新"
                ],
                dod: [
                  "命中規則的郵件可正確加標籤",
                  "規則衝突時結果符合優先順序"
                ],
                notes: "需保留可追蹤性（顯示命中哪條規則）。"
              },
              {
                title: "[FEATURE] 郵件篩選與搜尋功能",
                labels: ["type:feature", "priority:P1", "area:search", "area:ui"],
                purpose: "提高找信效率。",
                workitems: [
                  "依寄件人/標籤/已讀/日期篩選",
                  "關鍵字搜尋（主旨+內文）",
                  "搜尋結果排序與分頁"
                ],
                dod: [
                  "常見條件組合可在可接受時間內回應",
                  "空結果與錯誤狀態有清楚提示"
                ],
                notes: "行動裝置需優化搜尋輸入體驗。"
              },
              {
                title: "[FEATURE] 重要郵件推送規則管理",
                labels: ["type:feature", "priority:P1", "area:notification", "area:ui"],
                purpose: "可自訂推送條件與優先序。",
                workitems: [
                  "推送條件設定（寄件人/關鍵字/收件人/已讀）",
                  "推送規則優先順序管理",
                  "規則啟用/停用開關"
                ],
                dod: [
                  "規則可新增、排序、儲存",
                  "規則生效結果可被驗證"
                ],
                notes: "與分類規則可共用條件編輯元件。"
              },
              {
                title: "[FEATURE] 推送排程（即時 / 固定時間 X 次 / 每日定時）",
                labels: ["type:feature", "priority:P1", "area:notification", "area:scheduler"],
                purpose: "讓推送符合使用者偏好節奏。",
                workitems: [
                  "即時推送流程",
                  "固定時間推送 X 次",
                  "每日定時推送",
                  "時區處理"
                ],
                dod: [
                  "三種推送模式均可運作",
                  "跨日與時區行為符合預期"
                ],
                notes: "避免深夜大量通知，提供安靜時段選項。"
              },
              {
                title: "[FEATURE] 英文郵件按鈕觸發翻譯（英→繁中）",
                labels: ["type:feature", "priority:P1", "area:translation", "area:ui"],
                purpose: "在需要時快速閱讀英文郵件。",
                workitems: [
                  "郵件詳情頁加入「翻譯」按鈕",
                  "翻譯 API 串接（免費方案）",
                  "錯誤/超時/重試處理"
                ],
                dod: [
                  "未點按按鈕不會自動翻譯",
                  "翻譯結果正確顯示且可還原原文"
                ],
                notes: "需清楚提示「翻譯可能將內容送至外部服務」。"
              },
              {
                title: "[FEATURE] 全繁體中文 UI 與可用性調整",
                labels: ["type:feature", "priority:P1", "area:ui", "area:i18n"],
                purpose: "確保介面符合繁中使用者習慣。",
                workitems: [
                  "全介面文字繁中化",
                  "日期時間格式在地化",
                  "重要互動文案（錯誤、提示、引導）優化"
                ],
                dod: [
                  "無殘留英文系統文案（技術代碼除外）",
                  "主要流程文案可理解且一致"
                ],
                notes: "優先簡潔、可操作導向文案。"
              },
              {
                title: "[TASK] 安全與隱私治理（Token、日誌、資料最小化）",
                labels: ["type:task", "priority:P0", "area:security"],
                purpose: "降低敏感資料外洩風險。",
                workitems: [
                  "Token 加密與到期刷新策略",
                  "日誌去識別化",
                  "第三方服務資料外送告知與同意"
                ],
                dod: [
                  "不可在 Repo/Log 中找到敏感資訊",
                  "權限與資料使用有文件記錄"
                ],
                notes: "此 Issue 必須在 MVP 上線前完成。"
              },
              {
                title: "[TASK] 測試策略與品質檢查（分類/推送/翻譯）",
                labels: ["type:task", "priority:P1", "area:qa"],
                purpose: "確保核心流程穩定可回歸驗證。",
                workitems: [
                  "分類規則單元測試",
                  "推送排程整合測試",
                  "翻譯功能錯誤情境測試"
                ],
                dod: [
                  "核心模組有可重複執行的測試",
                  "重大缺陷可被測試攔截"
                ],
                notes: "先覆蓋高風險流程，再逐步擴充。"
              },
              {
                title: "[TASK] GitHub Action：Issue 自動標籤與檢查提示",
                labels: ["type:task", "priority:P1", "area:workflow"],
                purpose: "降低手動整理 Issue 的成本。",
                workitems: [
                  "建立自動標籤規則",
                  "建立優先級判定規則",
                  "建立 DoD 缺漏提醒留言"
                ],
                dod: [
                  "新 Issue 建立後可自動標籤",
                  "缺少 DoD 時會自動提醒"
                ],
                notes: "需與 Issue Template 欄位名稱一致。"
              },
              {
                title: "[TASK] 文件完善（README、架構、操作手冊）",
                labels: ["type:task", "priority:P2", "area:docs"],
                purpose: "讓非工程背景也能維護專案。",
                workitems: [
                  "README 補齊路線圖與流程",
                  "以網頁版 GitHub 操作為主的教學",
                  "常見問題與排錯指南"
                ],
                dod: [
                  "新使用者可依文件完成 Issue 建立與追蹤",
                  "文件結構清楚、可搜尋"
                ],
                notes: "維持短段落、清楚步驟。"
              },
              {
                title: "[BUG] 郵件分類結果與預期不一致（保留）",
                labels: ["type:bug", "priority:P1", "area:classification"],
                purpose: "提供正式缺陷通道，快速修正核心體驗問題。",
                workitems: [
                  "蒐集重現步驟與樣本資料",
                  "比對規則命中流程",
                  "修復並回歸測試"
                ],
                dod: [
                  "可穩定重現與修復",
                  "修復後測試通過且無副作用"
                ],
                notes: "此為常駐模板型 Issue，視實際狀況複製建立。"
              }
            ];

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100
            });
            const existingTitles = new Set(existing.map(i => i.title));

            for (const spec of issues) {
              if (existingTitles.has(spec.title)) {
                core.info(`Skip existing issue: ${spec.title}`);
                continue;
              }

              const body = [
                `## 目的`,
                spec.purpose,
                ``,
                `## 工作項目`,
                ...spec.workitems.map(item => `- [ ] ${item}`),
                ``,
                `## DoD（完成定義）`,
                ...spec.dod.map(item => `- [ ] ${item}`),
                ``,
                `## 相關備註`,
                spec.notes
              ].join("\n");

              await github.rest.issues.create({
                owner,
                repo,
                title: spec.title,
                body,
                labels: spec.labels
              });
            }
