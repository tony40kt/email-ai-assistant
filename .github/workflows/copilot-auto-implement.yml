name: Copilot Auto Implement - Issue Trigger

on:
  issues:
    types: [opened, reopened, edited, labeled]

permissions:
  issues: write
  pull-requests: read
  contents: read

concurrency:
  group: copilot-auto-implement-issue-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  route-auto-implement-issue:
    runs-on: ubuntu-latest
    env:
      AUTO_IMPLEMENT_LABEL: ${{ vars.AUTO_IMPLEMENT_LABEL || 'auto:implement' }}
      COPILOT_ASSIGNEE: ${{ vars.COPILOT_ASSIGNEE || 'copilot' }}
      TRUSTED_AUTOMATION_ACTORS: ${{ vars.TRUSTED_AUTOMATION_ACTORS || 'github-actions[bot],copilot' }}
      MARKER: "<!-- copilot-auto-implement:managed -->"
    steps:
      - name: Validate, assign Copilot, and add dedup marker
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issueNumber = issue?.number;
            const actorLogin = context.payload.sender?.login || context.actor || "";
            const actorLower = actorLogin.toLowerCase();
            const autoImplementLabel = process.env.AUTO_IMPLEMENT_LABEL || "auto:implement";
            const copilotAssignee = (process.env.COPILOT_ASSIGNEE || "copilot").toLowerCase();
            const marker = process.env.MARKER || "<!-- copilot-auto-implement:managed -->";
            const trustedPermissions = new Set(["admin", "maintain", "write"]);
            const trustedAutomationActors = new Set(
              (process.env.TRUSTED_AUTOMATION_ACTORS || "github-actions[bot],copilot")
                .split(",")
                .map((x) => x.trim().toLowerCase())
                .filter(Boolean)
            );

            core.info(`[debug] event=${context.eventName} action=${context.payload.action || "n/a"} issue=${issueNumber} actor=${actorLogin}`);
            core.info(`[debug] autoImplementLabel=${autoImplementLabel} copilotAssignee=${copilotAssignee}`);

            if (!issueNumber) {
              core.warning("No issue found in payload. Skipping.");
              return;
            }

            if (issue.state !== "open") {
              core.info(`Issue #${issueNumber} is not open (state=${issue.state}). Skipping.`);
              return;
            }

            const labels = (issue.labels || []).map((l) => l.name);
            if (!labels.includes(autoImplementLabel)) {
              core.info(`Issue #${issueNumber} does not have label '${autoImplementLabel}'. Skipping.`);
              return;
            }

            let trusted = trustedAutomationActors.has(actorLower);
            let permissionLevel = "unknown";

            if (!trusted && actorLogin) {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: actorLogin
                });
                permissionLevel = data?.permission || "unknown";
                trusted = trustedPermissions.has(permissionLevel);
              } catch (error) {
                core.warning(`Unable to resolve collaborator permission for '${actorLogin}': ${error.message}`);
              }
            }

            core.info(`[debug] actorTrusted=${trusted} permissionLevel=${permissionLevel}`);
            if (!trusted) {
              core.warning(`Actor '${actorLogin}' is not trusted. Allowed: admin/maintain/write or trusted automation actors.`);
              return;
            }

            let latestIssue = issue;
            const alreadyAssigned = (issue.assignees || []).some((a) => (a.login || "").toLowerCase() === copilotAssignee);

            if (!alreadyAssigned) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: [copilotAssignee]
                });
                core.info(`Requested assignment for '${copilotAssignee}' on issue #${issueNumber}.`);
              } catch (error) {
                core.warning(`Failed to assign '${copilotAssignee}' on issue #${issueNumber}: ${error.message}`);
              }
            } else {
              core.info(`Issue #${issueNumber} already has '${copilotAssignee}' assignee.`);
            }

            try {
              const { data } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              latestIssue = data;
            } catch (error) {
              core.warning(`Failed to re-fetch issue #${issueNumber} for assignee verification: ${error.message}`);
            }

            const verifiedAssignees = (latestIssue.assignees || []).map((a) => (a.login || "").toLowerCase());
            const assigneeVerified = verifiedAssignees.includes(copilotAssignee);
            core.info(`[debug] assigneeVerified=${assigneeVerified} assignees=${verifiedAssignees.join(",") || "(none)"}`);

            let comments = [];
            try {
              comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100
              });
            } catch (error) {
              core.warning(`Failed to list comments for #${issueNumber}: ${error.message}`);
            }

            const markerExists = comments.some((comment) => (comment.body || "").includes(marker));
            core.info(`[debug] markerExists=${markerExists} marker=${marker}`);

            if (!markerExists) {
              const body = [
                marker,
                "Copilot auto-implement workflow 已觸發：",
                `- AUTO_IMPLEMENT_LABEL: \`${autoImplementLabel}\``,
                `- Trigger actor: @${actorLogin}`,
                `- Assignee target: @${copilotAssignee}`,
                `- Assignee verification: ${assigneeVerified ? "✅ confirmed" : "⚠️ pending / failed"}`,
                "- 下一步：請確認 Copilot 是否回覆接單，並觀察是否建立關聯 PR。",
                "- 注意：Workflow 可做到可靠觸發/驗證/監控，但無法 100% 保證 Copilot 內部行為。"
              ].join("\n");

              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body
                });
                core.info(`Created marker comment for issue #${issueNumber}.`);
              } catch (error) {
                core.warning(`Failed to create marker comment on #${issueNumber}: ${error.message}`);
              }
            } else {
              core.info(`Marker comment already exists on #${issueNumber}.`);
            }
