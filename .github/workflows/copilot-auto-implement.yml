name: Copilot Auto Implement

on:
  issues:
    types: [opened, reopened, edited, labeled]
  workflow_dispatch:
    inputs:
      backfill:
        description: "Assign Copilot to open auto:implement issues that do not already have Copilot"
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: copilot-auto-implement-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  issue-auto-implement:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Route auto:implement issue to Copilot safely
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issue_number = issue.number;
            const actorLogin = context.payload.sender?.login || "";
            const actor = actorLogin.toLowerCase();
            const labels = (issue.labels || []).map((l) => l.name);

            if (issue.state !== "open") {
              core.info(`Issue #${issue_number} is not open. Skipping.`);
              return;
            }

            if (!labels.includes("auto:implement")) {
              core.info(`Issue #${issue_number} does not have auto:implement. Skipping.`);
              return;
            }

            const trustedActors = new Set(["github-actions[bot]", "copilot"]);
            const trustedPermissions = new Set(["admin", "maintain", "write"]);

            let trusted = trustedActors.has(actor);
            if (!trusted) {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: actorLogin
                });
                trusted = trustedPermissions.has(data.permission);
              } catch (error) {
                core.info(`Could not resolve collaborator permission for ${actorLogin}: ${error.message}`);
              }
            }

            if (!trusted) {
              core.warning(`Actor ${actorLogin} is not trusted. Skipping automation for issue #${issue_number}.`);
              return;
            }

            const issueAssignees = (issue.assignees || []).map((a) => a.login.toLowerCase());
            if (!issueAssignees.includes("copilot")) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: ["copilot"]
                });
                core.info(`Assigned Copilot to issue #${issue_number}.`);
              } catch (error) {
                core.warning(`Unable to assign Copilot on issue #${issue_number}: ${error.message}`);
              }
            } else {
              core.info(`Copilot already assigned on issue #${issue_number}.`);
            }

            const marker = "<!-- copilot-auto-implement -->";
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const alreadyCommented = comments.data.some((c) => (c.body || "").includes(marker));
            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `${marker}
Copilot auto-implement is enabled / 已啟用：
- Confirmed \`auto:implement\` label
- Attempted to assign Copilot agent
- Copilot will create a related PR from this issue
- 已確認 \`auto:implement\` label
- 已嘗試指派 Copilot 代理
- Copilot 會依 Issue 內容建立對應 PR`
              });
            }

  backfill-auto-implement:
    if: github.event_name == 'workflow_dispatch' && inputs.backfill == true
    runs-on: ubuntu-latest
    steps:
      - name: Backfill Copilot assignee for open auto:implement issues
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "auto:implement",
              per_page: 100
            });

            let assigned = 0;
            let skipped = 0;

            for (const issue of issues) {
              if (issue.pull_request) {
                skipped += 1;
                continue;
              }

              const assignees = (issue.assignees || []).map((a) => a.login.toLowerCase());
              if (assignees.includes("copilot")) {
                skipped += 1;
                continue;
              }

              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issue.number,
                  assignees: ["copilot"]
                });
                assigned += 1;
              } catch (error) {
                core.warning(`Failed to assign Copilot on #${issue.number}: ${error.message}`);
              }
            }

            core.info(`Backfill complete. Assigned=${assigned}, Skipped=${skipped}.`);
