name: Issue Auto PR

on:
  issues:
    types: [labeled]

permissions:
  issues: write

concurrency:
  group: issue-auto-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  verify-actor:
    if: github.event.label.name == 'auto:implement'
    runs-on: ubuntu-latest
    outputs:
      trusted: ${{ steps.check-actor.outputs.trusted }}
    steps:
      - name: Verify labeling actor is trusted
        id: check-actor
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const username = context.payload.sender.login;
            const trustedPermissions = new Set(["admin", "maintain", "write"]);

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username
              });
              const trusted = trustedPermissions.has(data.permission);
              core.setOutput("trusted", trusted ? "true" : "false");
              if (!trusted) {
                core.info(`Actor ${username} is not trusted (permission: ${data.permission}).`);
              }
            } catch (error) {
              core.info(`Could not determine collaborator permission for ${username}: ${error.message}`);
              core.setOutput("trusted", "false");
            }

  assign-copilot:
    needs: verify-actor
    if: github.event.label.name == 'auto:implement' && needs.verify-actor.outputs.trusted == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const assignees = (context.payload.issue.assignees || []).map(a => a.login);

            if (assignees.includes("Copilot")) {
              core.info(`Copilot is already assigned to issue #${issue_number}. Skipping.`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: ["Copilot"]
            });

            core.info(`Assigned Copilot to issue #${issue_number}.`);
