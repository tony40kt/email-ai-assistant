name: Issue Auto PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-auto-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-pr:
    if: github.event.label.name == 'auto:implement'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build branch metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.payload.issue.number;
            const title = context.payload.issue.title || "issue";
            const slug = title
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "")
              .slice(0, 40) || "task";
            core.setOutput("branch", `auto/issue-${number}-${slug}`);
            core.setOutput("file", `issues/auto/issue-${number}.md`);

      - name: Prepare issue branch content
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_FILE: ${{ steps.meta.outputs.file }}
        run: |
          mkdir -p "$(dirname "$ISSUE_FILE")"
          {
            echo "# Issue #$ISSUE_NUMBER"
            echo
            echo "## Title"
            echo "$ISSUE_TITLE"
            echo
            echo "## Source"
            echo "$ISSUE_URL"
            echo
            echo "## Description"
            echo "${ISSUE_BODY:-（無內容）}"
            echo
            echo "## Development Checklist"
            echo "- [ ] Analyze requirement"
            echo "- [ ] Implement changes"
            echo "- [ ] Run validation"
          } > "$ISSUE_FILE"

      - name: Create pull request from issue
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.meta.outputs.branch }}
          commit-message: "chore: initialize issue #${{ github.event.issue.number }} working branch"
          title: "chore: auto start issue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}.

            Source Issue: ${{ github.event.issue.html_url }}

            ## Included
            - Initialized issue working file `${{ steps.meta.outputs.file }}`

            Closes #${{ github.event.issue.number }}
          labels: |
            type:task
            area:workflow
