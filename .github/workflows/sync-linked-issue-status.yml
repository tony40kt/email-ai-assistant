name: Sync Linked Auto-Implement Issue Status

on:
  pull_request:
    types: [opened, reopened, edited, ready_for_review, synchronize, closed]

permissions:
  issues: write
  pull-requests: read
  repository-projects: write
  contents: read

concurrency:
  group: linked-issue-status-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync-status:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      AUTO_IMPLEMENT_LABEL: ${{ vars.AUTO_IMPLEMENT_LABEL || 'auto:implement' }}
      STATUS_FIELD_NAME: ${{ vars.PROJECT_STATUS_FIELD_NAME || 'Status' }}
      IN_PROGRESS_OPTION_NAME: ${{ vars.PROJECT_IN_PROGRESS_OPTION || 'In Progress' }}
      DONE_OPTION_NAME: ${{ vars.PROJECT_DONE_OPTION || 'Done' }}
      MARKER_PREFIX: "<!-- copilot-auto-implement:pr-sync:"
    steps:
      - name: Verify linked issues and sync PR/Issue status
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prAction = context.payload.action || "unknown";
            const autoImplementLabel = process.env.AUTO_IMPLEMENT_LABEL || "auto:implement";
            const statusFieldName = (process.env.STATUS_FIELD_NAME || "Status").trim().toLowerCase();
            const inProgressOptionName = (process.env.IN_PROGRESS_OPTION_NAME || "In Progress").trim().toLowerCase();
            const doneOptionName = (process.env.DONE_OPTION_NAME || "Done").trim().toLowerCase();
            const markerPrefix = process.env.MARKER_PREFIX || "<!-- copilot-auto-implement:pr-sync:";

            core.info(`[debug] pr=#${prNumber} action=${prAction} merged=${Boolean(pr.merged)}`);

            const linkedData = await github.graphql(
              `
              query($owner: String!, $repo: String!, $prNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $prNumber) {
                    closingIssuesReferences(first: 100) {
                      nodes {
                        id
                        number
                        labels(first: 50) {
                          nodes { name }
                        }
                        projectItems(first: 20) {
                          nodes {
                            id
                            project { id title }
                            fieldValues(first: 50) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  optionId
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      id
                                      name
                                      options { id name }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { owner, repo, prNumber }
            );

            let linkedIssues = linkedData?.repository?.pullRequest?.closingIssuesReferences?.nodes || [];

            if (linkedIssues.length === 0) {
              core.info("No closingIssuesReferences found; trying PR body fallback parsing.");
              const text = `${pr.title || ""}\n${pr.body || ""}`;
              const keywordRefRegex = /\b(close[sd]?|fix(?:es|ed)?|resolve[sd]?)\s+#(\d+)\b/gi;
              const refs = [...text.matchAll(keywordRefRegex)].map((m) => Number(m[2])).filter((n) => Number.isInteger(n));
              const uniqueRefs = [...new Set(refs)];
              for (const issueNumber of uniqueRefs) {
                try {
                  const { data } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                  if (data.pull_request) continue;
                  linkedIssues.push({
                    id: data.node_id,
                    number: data.number,
                    labels: { nodes: (data.labels || []).map((l) => ({ name: l?.name || String(l || "") })) },
                    projectItems: { nodes: [] }
                  });
                } catch (error) {
                  core.warning(`Failed to fetch fallback issue #${issueNumber}: ${error.message}`);
                }
              }
            }

            const autoIssues = linkedIssues.filter((issue) =>
              (issue.labels?.nodes || []).some((label) => label.name === autoImplementLabel)
            );

            if (autoIssues.length === 0) {
              core.info(`PR #${prNumber} has no linked issue with '${autoImplementLabel}'. Skipping sync.`);
              return;
            }

            const desiredStatusName = prAction === "closed" && pr.merged ? doneOptionName : inProgressOptionName;
            core.info(`[debug] linkedAutoIssues=${autoIssues.map((x) => x.number).join(",")} desiredStatus=${desiredStatusName}`);

            for (const issue of autoIssues) {
              const issueNumber = issue.number;
              const marker = `${markerPrefix}${prNumber} -->`;
              let comments = [];
              try {
                comments = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: issueNumber,
                  per_page: 100
                });
              } catch (error) {
                core.warning(`Failed to list comments on issue #${issueNumber}: ${error.message}`);
              }

              const hasMarker = comments.some((c) => (c.body || "").includes(marker));
              if (!hasMarker) {
                let statusLine = "已建立/更新";
                if (prAction === "closed" && pr.merged) statusLine = "已合併";
                if (prAction === "closed" && !pr.merged) statusLine = "已關閉（未合併）";
                const body = [
                  marker,
                  `🔄 PR #${prNumber} 已與此 auto:implement issue 連動同步（${statusLine}）。`,
                  `- PR: ${pr.html_url}`,
                  `- Event: \`${prAction}\``,
                  `- Verification: linked issue + label \`${autoImplementLabel}\``
                ].join("\n");
                try {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body
                  });
                } catch (error) {
                  core.warning(`Failed to add sync comment on issue #${issueNumber}: ${error.message}`);
                }
              }

              const issueItems = issue.projectItems?.nodes || [];
              if (issueItems.length === 0) {
                core.info(`Issue #${issueNumber} has no project items; comment sync only.`);
                continue;
              }

              for (const item of issueItems) {
                const statusFieldValue = (item.fieldValues?.nodes || []).find((value) => {
                  const fieldName = value?.field?.name || "";
                  return fieldName.toLowerCase() === statusFieldName;
                });

                const statusField = statusFieldValue?.field;
                if (!statusField?.id) {
                  core.info(`Issue #${issueNumber} project '${item.project?.title || "unknown"}' missing status field access.`);
                  continue;
                }

                const targetOption = (statusField.options || []).find((option) => option.name.toLowerCase() === desiredStatusName);
                if (!targetOption?.id) {
                  core.info(`Project '${item.project?.title || "unknown"}' has no option '${desiredStatusName}'.`);
                  continue;
                }

                const currentName = (statusFieldValue?.name || "").toLowerCase();
                if (currentName === desiredStatusName) {
                  core.info(`Issue #${issueNumber} already at '${desiredStatusName}' for project '${item.project?.title || "unknown"}'.`);
                  continue;
                }

                try {
                  await github.graphql(
                    `
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item { id }
                      }
                    }
                    `,
                    {
                      projectId: item.project.id,
                      itemId: item.id,
                      fieldId: statusField.id,
                      optionId: targetOption.id
                    }
                  );
                  core.info(`Issue #${issueNumber} moved to '${desiredStatusName}' in project '${item.project?.title || "unknown"}'.`);
                } catch (error) {
                  core.warning(`Failed to update project status for issue #${issueNumber}: ${error.message}`);
                }
              }
            }
