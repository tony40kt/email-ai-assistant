name: 錯誤回報
description: 錯誤回報與修復追蹤
title: "[BUG] "
labels:
  - type:bug
  - priority:P1
body:
  - type: input
    id: summary
    attributes:
      label: 問題摘要
      description: 請用一句話描述問題
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 優先級
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 重現步驟
      placeholder: |
        1. 進入...
        2. 點擊...
        3. 發生...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 預期結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 實際結果
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: DoD（完成定義）
      placeholder: |
        - [ ] 已完成修復
        - [ ] 已完成回歸驗證
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 相關備註

